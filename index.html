<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJET REGISTRE - AUTHENTIFICATION</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div id="boot-screen"></div>

    <div class="login-container">
        <div class="login-header">
            <h1>PROJET REGISTRE</h1>
            <h2>SYSTÈME CENTRAL ARCHIVAGE</h2>
        </div>
        
        <div class="login-body">
            <p class="instruction">Authentification requise.</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Identifiant (Prénom Nom) :</label>
                    <input type="text" id="username" autocomplete="off" spellcheck="false" required>
                </div>
                <button type="submit">CONNEXION</button>
            </form>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div class="login-footer">BUILD 4.02.11</div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
